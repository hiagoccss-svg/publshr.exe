# Publish the macOS Publshr.app "live" channel on every push to main.
# Installed apps and install-publshr.sh always use the same asset URLs.
name: Deliver macOS live app

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-publish-live:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Compute version
        id: ver
        run: |
          BASE="$(tr -d '[:space:]' < mac/publshr/VERSION)"
          BUILD="${GITHUB_RUN_NUMBER}"
          FULL="${BASE}.${BUILD}"
          echo "base=$BASE" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "full=$FULL" >> "$GITHUB_OUTPUT"
          echo "tag=v${FULL}" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build native macOS app
        working-directory: mac/publshr
        env:
          PUBLSHR_BUILD_NUMBER: ${{ steps.ver.outputs.build }}
        run: |
          chmod +x scripts/*.sh scripts/lib-swift-build-paths.sh scripts/generate-app-icon.swift
          bash scripts/package-release.sh "${{ steps.ver.outputs.full }}"

      - name: Verify Publshr.app in tarball
        run: |
          FULL="${{ steps.ver.outputs.full }}"
          ASSET="mac/publshr/dist/publshr-${FULL}-macos-aarch64.tar.gz"
          test -f "$ASSET"
          TMP="$(mktemp -d)"
          tar -xzf "$ASSET" -C "$TMP"
          APP="$(find "$TMP" -path '*/Publshr.app' -type d | head -1)"
          test -n "$APP"
          bash mac/publshr/scripts/verify-macos-app-bundle.sh "$APP"
          SIZE="$(wc -c < "$ASSET" | tr -d ' ')"
          echo "Asset size: $SIZE bytes"
          if [[ "$SIZE" -lt 4000000 ]]; then
            echo "ERROR: tarball too small — expected full IDE app" >&2
            exit 1
          fi
          rm -rf "$TMP"

      - name: Prepare stable live asset names
        run: |
          FULL="${{ steps.ver.outputs.full }}"
          SRC="mac/publshr/dist/publshr-${FULL}-macos-aarch64.tar.gz"
          cp "$SRC" "mac/publshr/dist/Publshr-macos-aarch64.tar.gz"
          echo "${FULL}" > mac/publshr/dist/VERSION.txt
          echo "${{ steps.ver.outputs.build }}" >> mac/publshr/dist/VERSION.txt

      - name: Package lightweight installer download (zip + script)
        run: |
          chmod +x mac/publshr/scripts/package-install-download.sh
          bash mac/publshr/scripts/package-install-download.sh
          test -f mac/publshr/dist/Publshr-Install-macos.zip
          test -f mac/publshr/dist/Publshr-install-macos.sh

      - name: Publish versioned + live releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FULL="${{ steps.ver.outputs.full }}"
          TAG="${{ steps.ver.outputs.tag }}"
          BUILD="${{ steps.ver.outputs.build }}"
          REPO="${{ github.repository }}"
          VERSIONED="mac/publshr/dist/publshr-${FULL}-macos-aarch64.tar.gz"
          LIVE="mac/publshr/dist/Publshr-macos-aarch64.tar.gz"
          INSTALL_ZIP="mac/publshr/dist/Publshr-Install-macos.zip"
          INSTALL_SH="mac/publshr/dist/Publshr-install-macos.sh"
          NOTES="build_number: ${BUILD}
          version: ${FULL}
          commit: ${{ github.sha }}

          **Downloads**
          | File | Use |
          |------|-----|
          | \`Publshr-Install-macos.zip\` | Share with your team — unzip, double-click **Publshr Install.command** |
          | \`Publshr-install-macos.sh\` | Shell script only |
          | \`Publshr-macos-aarch64.tar.gz\` | Full app tarball (IT / offline extract) |

          **One-line install:**
          \`\`\`bash
          curl -fsSL \"https://raw.githubusercontent.com/${REPO}/refs/heads/main/install-macos.sh\" | bash
          \`\`\`

          Installed Publshr.app auto-updates from the \`live\` release when you push to \`main\`."

          # Versioned release (history)
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release upload "$TAG" "$VERSIONED" --repo "$REPO" --clobber
          else
            gh release create "$TAG" --repo "$REPO" --title "Publshr ${FULL}" --notes "$NOTES" "$VERSIONED"
          fi

          # Live channel (fixed URL — installer + auto-updater)
          if gh release view "live" --repo "$REPO" >/dev/null 2>&1; then
            gh release edit "live" --repo "$REPO" --title "Publshr live (${FULL})" --notes "$NOTES"
            gh release upload "live" "$LIVE" "$INSTALL_ZIP" "$INSTALL_SH" "mac/publshr/dist/VERSION.txt" --repo "$REPO" --clobber
          else
            gh release create "live" --repo "$REPO" --title "Publshr live (${FULL})" --notes "$NOTES" \
              "$LIVE" "$INSTALL_ZIP" "$INSTALL_SH" "mac/publshr/dist/VERSION.txt"
          fi

          echo "Published ${TAG} and live → Publshr-macos-aarch64.tar.gz, Publshr-Install-macos.zip"
