name: Verify Spaces desktop

on:
  push:
    branches: [main]
    paths:
      - 'desktop/spaces/**'
      - 'desktop/enterprise/**'
      - 'shared/desktop/**'
      - 'supabase/migrations/**'
      - '.github/workflows/verify-spaces.yml'
  pull_request:
    paths:
      - 'desktop/spaces/**'
      - 'desktop/enterprise/**'
      - 'shared/desktop/**'
      - 'supabase/migrations/**'
      - '.github/workflows/verify-spaces.yml'

permissions:
  contents: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Avoid flaky PR merge-ref fetch; checkout the branch head directly.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/spaces/package-lock.json
      - name: Install and verify Spaces
        working-directory: desktop/spaces
        run: |
          npm ci
          npm run typecheck
          npm run build:web

      - name: Install and verify Enterprise
        working-directory: desktop/enterprise
        run: |
          npm ci
          npm run typecheck
          npm run build
