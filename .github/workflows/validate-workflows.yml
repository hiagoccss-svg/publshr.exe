# Fails fast when workflow YAML is invalid (prevents "workflow file issue" emails on every push).
name: Validate CI workflows

on:
  pull_request:
    paths:
      - '.github/workflows/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash | bash -s
          sudo mv actionlint /usr/local/bin/
      - name: Lint workflow files
        run: actionlint -color
